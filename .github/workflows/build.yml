# Builds unsigned installers for Windows and macOS.
# macOS builds can only be produced on macOS, hence this workflow: trigger it
# manually from the Actions tab, or push a v* tag. Artifacts are attached to
# the run; publish them through GitHub Releases.
name: build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The app bundles the uv binary (resources/.uv/) and uses it at runtime
      # to provision the Python sidecar environment on the user's machine.
      - name: Fetch uv binary (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          mkdir -p .uv
          cp "$HOME/.local/bin/uv" .uv/uv

      - name: Fetch uv binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          New-Item -ItemType Directory -Force .uv | Out-Null
          Copy-Item "$env:USERPROFILE\.local\bin\uv.exe" .uv\uv.exe

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build renderer + main
        working-directory: app
        run: npm run build

      - name: Package (unsigned)
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: amv-tools-${{ runner.os }}
          path: |
            app/release/*.exe
            app/release/*.dmg
            app/release/*.zip
            app/release/*.blockmap
          if-no-files-found: error
